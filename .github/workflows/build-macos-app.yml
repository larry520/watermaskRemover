name: Build macOS App (M4/ARM)

on:
  push:
    tags:
      - 'v*'  # 当推送 v1.0.0 这样的标签时触发
  workflow_dispatch:  # 允许手动触发

jobs:
  build-macos:
    runs-on: macos-14  # macOS ARM runner (M1/M2/M3/M4 兼容)
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        architecture: 'arm64'  # 确保是 ARM 版本
    
    - name: Install system dependencies
      run: |
        # 安装必要的系统依赖
        brew install portaudio
        brew install ffmpeg
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Create application bundle
      run: |
        # 创建启动脚本
        cat > run_app.py << 'EOF'
        import subprocess
        import sys
        import os
        from pathlib import Path
        
        # 获取应用程序路径
        if getattr(sys, 'frozen', False):
            app_path = Path(sys._MEIPASS)
        else:
            app_path = Path(__file__).parent
        
        # 设置工作目录
        os.chdir(app_path)
        
        # 启动 Web 服务
        subprocess.run([sys.executable, "start_web.py"])
        EOF
        
        # 使用 PyInstaller 打包
        pyinstaller --name="WatermarkRemover" \
          --windowed \
          --icon=icon.icns \
          --add-data="web:web" \
          --add-data="src:src" \
          #--add-data="api:api" \
          --hidden-import=easyocr \
          --hidden-import=iopaint \
          --hidden-import=fastapi \
          --hidden-import=uvicorn \
          --hidden-import=moviepy \
          --collect-all easyocr \
          --collect-all iopaint \
          --noconfirm \
          run_app.py
    
    - name: Create DMG installer
      run: |
        # 创建 DMG 安装包
        brew install create-dmg
        
        create-dmg \
          --volname "Watermark Remover" \
          --volicon "icon.icns" \
          --window-pos 200 120 \
          --window-size 800 400 \
          --icon-size 100 \
          --icon "WatermarkRemover.app" 200 190 \
          --hide-extension "WatermarkRemover.app" \
          --app-drop-link 600 185 \
          "WatermarkRemover-macOS-ARM.dmg" \
          "dist/WatermarkRemover.app"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WatermarkRemover-macOS-ARM
        path: WatermarkRemover-macOS-ARM.dmg
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: WatermarkRemover-macOS-ARM.dmg
        body: |
          # Watermark Remover for macOS (Apple Silicon)
          
          适用于 M1/M2/M3/M4 芯片的 Mac
          
          ## 安装方法
          1. 下载 DMG 文件
          2. 双击打开
          3. 将应用拖入 Applications 文件夹
          4. 首次运行需要右键点击 -> 打开
          
          ## 使用方法
          1. 双击运行应用
          2. 自动打开浏览器访问 http://localhost:8000
          3. 开始使用！
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
